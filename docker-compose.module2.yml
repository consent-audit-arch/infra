services:
  postgres-user:
    image: postgres:16
    container_name: user-postgres
    environment:
      POSTGRES_USER: ${USER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${USER_POSTGRES_PASSWORD}
      POSTGRES_DB: ${USER_POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    networks:
      - consent-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_POSTGRES_USER} -d ${USER_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-keycloak:
    image: postgres:16
    container_name: keycloak-postgres
    environment:
      POSTGRES_USER: ${KEYCLOAK_POSTGRES_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_POSTGRES_PASSWORD}
      POSTGRES_DB: ${KEYCLOAK_POSTGRES_DB}
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    networks:
      - consent-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_POSTGRES_USER} -d ${KEYCLOAK_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: consent-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/${KEYCLOAK_POSTGRES_DB}
      KC_DB_USERNAME: ${KEYCLOAK_POSTGRES_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_PORT: 8080
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8180
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8180:8080"
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - consent-net

  postgres-billing:
    image: postgres:16
    container_name: billing-postgres
    environment:
      POSTGRES_USER: billing_service_user
      POSTGRES_PASSWORD: billing_service_pass
      POSTGRES_DB: billing_db
    ports:
      - "5434:5432"
    volumes:
      - billing_postgres_data:/var/lib/postgresql/data
    networks:
      - consent-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing_service_user -d billing_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    image: ${USER_SERVICE_IMAGE}
    container_name: user-service
    ports:
      - "8083:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://user-postgres:5432/user_db
      DB_USERNAME: ${USER_DB_USERNAME}
      DB_PASSWORD: ${USER_DB_PASSWORD}
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/tcc
      KEYCLOAK_JWK_SET_URI: http://consent-keycloak:8080/realms/tcc/protocol/openid-connect/certs
      OPA_URL: http://localhost:8181/v1/data/user/authz/decision
      OPA_KEYCLOAK_TOKEN_URI: http://consent-keycloak:8080/realms/tcc/protocol/openid-connect/token
      OPA_CLIENT_ID: user-service
      OPA_CLIENT_SECRET: ${USER_SERVICE_CLIENT_SECRET}
    depends_on:
      postgres-user:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    volumes:
      - opa-user-policies:/shared-policies
    networks:
      - consent-net

  opa-user-service:
    image: openpolicyagent/opa:0.63.0
    container_name: opa-user-service
    network_mode: "service:user-service"
    restart: on-failure
    environment:
      OPA_KEYCLOAK_TOKEN_URI: http://consent-keycloak:8080/realms/tcc/protocol/openid-connect/token
      OPA_CLIENT_ID: user-service
      OPA_CLIENT_SECRET: ${USER_SERVICE_CLIENT_SECRET}
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--set=decision_logs.console=true"
      - "/policies"
    volumes:
      - opa-user-policies:/policies:ro
    depends_on:
      - user-service

  billing-service:
    image: ${BILLING_SERVICE_IMAGE}
    container_name: billing-service
    ports:
      - "8084:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://billing-postgres:5432/billing_db
      DB_USERNAME: ${BILLING_DB_USERNAME}
      DB_PASSWORD: ${BILLING_DB_PASSWORD}
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/tcc
      KEYCLOAK_JWK_SET_URI: http://consent-keycloak:8080/realms/tcc/protocol/openid-connect/certs
      KEYCLOAK_TOKEN_URI: http://consent-keycloak:8080/realms/tcc/protocol/openid-connect/token
      BILLING_SERVICE_CLIENT_SECRET: ${BILLING_SERVICE_CLIENT_SECRET}
      OPA_URL: http://localhost:8181/v1/data/billing/authz/decision
      USER_SERVICE_URL: http://user-service:8080
      OPA_KEYCLOAK_TOKEN_URI: http://consent-keycloak:8080/realms/tcc/protocol/openid-connect/token
      OPA_CLIENT_ID: billing-service
      OPA_CLIENT_SECRET: ${BILLING_SERVICE_CLIENT_SECRET}
    depends_on:
      postgres-billing:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      user-service:
        condition: service_started
    volumes:
      - opa-billing-policies:/shared-policies
    networks:
      - consent-net

  opa-billing-service:
    image: openpolicyagent/opa:0.63.0
    container_name: opa-billing-service
    network_mode: "service:billing-service"
    restart: on-failure
    environment:
      OPA_KEYCLOAK_TOKEN_URI: http://consent-keycloak:8080/realms/tcc/protocol/openid-connect/token
      OPA_CLIENT_ID: billing-service
      OPA_CLIENT_SECRET: ${BILLING_SERVICE_CLIENT_SECRET}
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--set=decision_logs.console=true"
      - "/policies"
    volumes:
      - opa-billing-policies:/policies:ro
    depends_on:
      - billing-service

networks:
  consent-net:
    external: true
    name: consent-net

volumes:
  user_postgres_data:
  keycloak_postgres_data:
  billing_postgres_data:
  opa-user-policies:
  opa-billing-policies:
